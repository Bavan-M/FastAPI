 # ============================
    # Rate limiting at Nginx level
    # ============================
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=llm:10m rate=2r/s;

upstream fastapi_app {
    # When you scale to 10 FastAPI containers, Nginx distributes traffic between them.
    server app:8000;
    # Keep 32 phone lines open for quick calls
    keepalive 32; 
    
}

server {
    # Tells Nginx to listen for requests on port 80
    listen 80;
    server_name localhost;

    # Installing locks and alarms on your house doors.
    add_header X-Frame-Options        "DENY"                    always;
    add_header X-Content-Type-Options "nosniff"                 always;
    add_header X-XSS-Protection       "1; mode=block"           always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Hide Nginx version from attackers
    server_tokens off;

    # Max request body size — important for file uploads
    client_max_body_size 50M;

    # Timeouts
    proxy_connect_timeout  10s;  # How long to wait connecting to FastAPI
    proxy_send_timeout     30s;  # How long to wait sending request to FastAPI
    proxy_read_timeout     60s;  # How long to wait for FastAPI's response

    # Gzip compression — reduces response size by 60-80%
    # Nginx does compression in C (fast). Python would struggle with large responses.
    gzip              on;
    gzip_vary         on;
    gzip_types        application/json text/plain text/css application/javascript;
    gzip_min_length   1000;

    # ============================
    # Health check — no logging
    # ============================
    location /health {
        proxy_pass http://fastapi_app;
        access_log off;   # don't spam logs with health checks
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;

        # Pass real client IP to FastAPI
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for WebSocket support
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Required for SSE streaming — disable buffering
        # Nginx likes to collect the entire response before sending it to the client (like filling a bucket before pouring). 
        proxy_buffering    off;

        # Caching stores the entire response. For LLM streaming, each response is unique (different every time) and caching would just slow things down.
        proxy_cache        off;

    }

   

    location /api/v1/generate {
        # Stricter rate limit for LLM endpoint
        limit_req zone=llm burst=5 nodelay;
        limit_req_status 429;

        proxy_pass            http://fastapi_app;
        proxy_set_header Host $host;
        proxy_read_timeout    120s;   # LLM calls can be slow
        proxy_buffering       off;    # required for streaming
    }
}

