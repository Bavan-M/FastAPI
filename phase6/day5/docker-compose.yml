# docker-compose.yml — Production stack



# ============================================================
# NETWORKS — isolate services
# ============================================================
networks:
  frontend:   # Nginx → App
    driver: bridge
  backend:    # App → DB, Redis, MongoDB
    driver: bridge


# ============================================================
# VOLUMES — persist data across container restarts
# ============================================================
volumes:
  postgres_data:
  redis_data:
  mongo_data:
  nginx_logs:


# ============================================================
# SERVICES
# ============================================================
services:

  # ==================
  # FastAPI Application
  # ==================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner           # use production stage
    image: genai-api:latest
    #container_name: genai_app

    environment:
      - APP_NAME=Gen AI API
      - VERSION=1.0.0
      - ENV=production
      - DEBUG=false

      # Load secrets from .env file — never hardcode
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}

      # Services use Docker internal hostnames — not localhost
      - DATABASE_URL=postgresql+asyncpg://genai:${POSTGRES_PASSWORD}@postgres:5432/genai_db
      - REDIS_URL=redis://redis:6379
      - MONGODB_URL=mongodb://mongo:27017

      - DEFAULT_MODEL=gpt-4
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_PER_MINUTE=60
      - LOG_LEVEL=INFO

    # Only accessible through Nginx — not exposed to internet
    expose:
      - "8000"

    networks:
      - frontend
      - backend

    depends_on:
      postgres:
        condition: service_healthy    # wait until postgres is healthy
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 15s

    restart: unless-stopped

    # Resource limits — prevent one container from starving others
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


  # ==================
  # Nginx Reverse Proxy
  # ==================
  nginx:
    image: nginx:1.25-alpine
    container_name: genai_nginx

    ports:
      - "80:80"     # HTTP
      # - "443:443" # HTTPS (uncomment with SSL certs)

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx

    networks:
      - frontend

    depends_on:
      app:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1",
             "--spider", "http://localhost/health"]
      interval: 30s
      timeout:  5s
      retries:  3


  # ==================
  # PostgreSQL
  # ==================
  postgres:
    image: postgres:16-alpine
    container_name: genai_postgres

    environment:
      - POSTGRES_USER=genai
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=genai_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    # Not exposed to internet — only internal network
    networks:
      - backend

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genai -d genai_db"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 1G


  # ==================
  # Redis
  # ==================
  redis:
    image: redis:7-alpine
    container_name: genai_redis

    # Password protection + persistence
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    networks:
      - backend

    healthcheck:
      test: ["CMD", "redis-cli",
             "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

    restart: unless-stopped


  # ==================
  # MongoDB (for chat history + documents)
  # ==================
  mongo:
    image: mongo:7
    container_name: genai_mongo

    environment:
      - MONGO_INITDB_ROOT_USERNAME=genai
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=genai_db

    volumes:
      - mongo_data:/data/db

    networks:
      - backend

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout:  10s
      retries:  5
      start_period: 20s

    restart: unless-stopped